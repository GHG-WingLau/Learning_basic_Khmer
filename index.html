<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khmer Language Learning App</title>
    <style>
        body { font-family: 'Khmer OS Battambang', Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f7f6; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .language-card { padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .english-text { font-size: 18px; color: #64748b; font-style: italic; margin-bottom: 5px; }
        .khmer-text { font-size: 32px; color: #1e3a8a; font-weight: bold; margin-top: 5px; line-height: 1.5; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .btn { padding: 12px 24px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; color: white; display: inline-flex; align-items: center; gap: 8px; font-weight: bold; transition: all 0.2s ease; }
        
        .btn-play { background-color: #3b82f6; }
        .btn-play:hover { background-color: #2563eb; }
        .btn-record { background-color: #ef4444; }
        .btn-record:hover { background-color: #dc2626; }
        .btn-record.recording { background-color: #b91c1c; animation: pulse 1.5s infinite; }
        
        .score-box { margin-top: 25px; padding: 15px; border-radius: 8px; background: #f0fdf4; display: inline-block; min-width: 150px; }
        .score-label { font-size: 14px; color: #166534; text-transform: uppercase; letter-spacing: 0.05em; }
        .score-display { font-size: 48px; font-weight: bold; color: #10b981; }
        
        .transcript { color: #4b5563; font-style: italic; margin-top: 15px; min-height: 24px; font-size: 15px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Khmer Practice Phrase</h2>
    
    <div class="language-card">
        <!-- English reference text -->
        <div class="english-text">"Hello! Are you well?"</div>
        <!-- Target Khmer word to voice compare -->
        <div class="khmer-text" id="target">សួស្ដី! អ្នកសុខសប្បាយជាទេ?</div>
    </div>
    
    <div class="btn-group">
        <!-- Play Button using Google TTS audio network link -->
        <button class="btn btn-play" id="playBtn">🔊 Play Audio</button>
        <!-- Compare logic mapping user micro input -->
        <button class="btn btn-record" id="recordBtn">🎙️ Record & Compare</button>
    </div>
    
    <div class="transcript" id="userSpeech">Click "Record" and read out loud...</div>
    
    <div class="score-box">
        <div class="score-label">Pronunciation Score</div>
        <div class="score-display" id="score">0%</div>
    </div>
</div>

<script>
    const playBtn = document.getElementById('playBtn');
    const recordBtn = document.getElementById('recordBtn');
    const userSpeechDisplay = document.getElementById('userSpeech');
    const scoreDisplay = document.getElementById('score');
    
    // Clean target text to normalize layout spaces
    const targetText = document.getElementById('target').innerText.trim();

    // 1. Google TTS Playback Functionality
    playBtn.addEventListener('click', () => {
        // Formulate request to Google's translation audio engine
        const encodedText = encodeURIComponent(targetText);
        const ttsUrl = `https://google.com{encodedText}`;
        
        const audio = new Audio(ttsUrl);
        playBtn.innerText = "⏳ Loading...";
        playBtn.disabled = true;
        
        audio.play().then(() => {
            playBtn.innerText = "🔊 Play Audio";
            playBtn.disabled = false;
        }).catch(err => {
            console.error(err);
            playBtn.innerText = "🔊 Play Audio";
            playBtn.disabled = false;
            alert("Audio block caught by browser browser configuration. Try playing again.");
        });
    });

    // 2. Microphone Input Speech Recognition API Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        userSpeechDisplay.innerText = "Error: Browser does not support Speech Recognition. Use desktop Google Chrome.";
        recordBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        
        // Switched to 'km' for wide stability across devices
        recognition.lang = 'km'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        let isRecording = false;

        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.innerText = "🛑 Stop & Score";
            recordBtn.classList.add('recording');
            userSpeechDisplay.innerText = "Listening to your voice...";
        };

        recognition.onend = () => {
            isRecording = false;
            recordBtn.innerText = "🎙️ Record & Compare";
            recordBtn.classList.remove('recording');
        };

        recognition.onresult = (event) => {
            const userText = event.results[0][0].transcript.trim();
            userSpeechDisplay.innerText = `You said: "${userText}"`;
            
            // Core character proximity assessment algorithm engine
            const matchScore = calculateMatchPercentage(targetText, userText);
            scoreDisplay.innerText = `${matchScore}%`;
        };

        recognition.onerror = (event) => {
            if(event.error === 'network') {
                userSpeechDisplay.innerText = "Error: Network issue. Ensure you are on Desktop Chrome with a solid internet connection.";
            } else {
                userSpeechDisplay.innerText = `Error occurred: ${event.error}`;
            }
        };
    }

    // Levenshtein Matrix character validation string layout map
    function calculateMatchPercentage(str1, str2) {
        // Strip punctuation spaces to isolate character checks
        const clean = (s) => s.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()? Cambodia\s]/g,"");
        const s1 = clean(str1);
        const s2 = clean(str2);

        if (s1 === s2) return 100;
        if (s1.length === 0 || s2.length === 0) return 0;

        const track = Array(s2.length + 1).fill(null).map(() => Array(s1.length + 1).fill(null));
        for (let i = 0; i <= s1.length; i += 1) track[0][i] = i;
        for (let j = 0; j <= s2.length; j += 1) track[j][0] = j;
        
        for (let j = 1; j <= s2.length; j += 1) {
            for (let i = 1; i <= s1.length; i += 1) {
                const indicator = s1[i - 1] === s2[j - 1] ? 0 : 1;
                track[j][i] = Math.min(
                    track[j - 1][i] + 1, 
                    track[j][i - 1] + 1, 
                    track[j - 1][i - 1] + indicator 
                );
            }
        }
        
        const distance = track[s2.length][s1.length];
        const maxLength = Math.max(s1.length, s2.length);
        let percent = Math.round(((maxLength - distance) / maxLength) * 100);
        return percent < 0 ? 0 : percent;
    }
</script>

</body>
</html>
